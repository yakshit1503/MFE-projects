<div class="portfolio-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">Yakshit Chawla</a>
    <nav aria-label="Primary navigation">
      <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a mat-button [routerLink]="projectsLink()" routerLinkActive="active">Projects</a>
    </nav>
    <div class="session-area">
      <button
        class="theme-toggle"
        type="button"
        role="switch"
        aria-label="Theme"
        [attr.aria-checked]="theme() === 'dark'"
        (click)="setTheme(theme() === 'dark' ? 'light' : 'dark')"
      >
        <span class="theme-track" aria-hidden="true">
          <span class="theme-thumb"></span>
        </span>
        <span class="theme-label">{{ theme() === 'dark' ? 'Dark' : 'Light' }}</span>
      </button>
      @if (session(); as activeSession) {
        <span>{{ activeSession.label }}</span>
        <button mat-flat-button type="button" (click)="logout()">Logout</button>
      } @else {
        <a mat-flat-button routerLink="/projects">Login</a>
      }
    </div>
  </header>

  <main class="page-stage">
    <router-outlet />
  </main>
</div>
