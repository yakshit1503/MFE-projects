<mat-card class="projects-dashboard">
  <mat-card-content>
    <p class="eyebrow">Project Studio</p>
    <h1>{{ session()?.label }} demo library</h1>
    <p class="lede">
      Choose a product experience below. Each demo opens inside the portfolio while its feature code remains owned by
      its dedicated application.
    </p>

    <div class="project-grid">
      @for (project of projects(); track project.key) {
        <mat-card class="project-card" appearance="outlined">
          <a [routerLink]="project.route">
            <span>{{ project.name }}</span>
            <p>{{ project.description }}</p>
          </a>
        </mat-card>
      }
    </div>
  </mat-card-content>
</mat-card>
